# Pings fbi-data-api demo (https://teddythepooh.streamlit.app/) twice a day to keep it alive, otherwise it will enter sleep mode.
name: Ping Streamlit Dashboard

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: curl -s https://teddythepooh.streamlit.app/ > /dev/null
