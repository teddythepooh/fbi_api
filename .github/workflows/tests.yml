name: Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        #run: uv sync --dev
        run: uv sync --locked --dev

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/test_json.py --verbose
